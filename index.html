      {title:{en:"Design Aptitude & Creativity",hi:"डिज़ाइन योग्यता और रचनात्मकता",mr:"डिझाइन क्षमता",ta:"வடிவமைப்பு திறன்",te:"డిజైన్ ఆప్టిట్యూడ్",kn:"ಡಿಸೈನ್ ಅಪ್ಟಿಟ್ಯೂಡ್",ml:"ഡിസൈൻ ആപ്റ്റിറ്റ്യൂഡ്"},content:{en:"Tests spatial reasoning, visual memory and creative thinking. Includes drawing from imagination and 3D visualization tasks.",hi:"स्थानिक तर्क, दृश्य स्मृति और रचनात्मक सोच का परीक्षण। कल्पना से चित्रांकन शामिल है।",mr:"स्थानिक तर्क, दृश्य स्मृती आणि सर्जनशील विचार. कल्पनेतून चित्रकाम.",ta:"இடஞ்சார்ந்த சிந்தனை, காட்சி நினைவகம் மற்றும் படைப்பாற்றல் சிந்தனை.",te:"స్థానిక తార్కికం, దృశ్య స్మృతి మరియు సృజనాత్మక ఆలోచన.",kn:"ಪ್ರಾದೇಶಿಕ ತರ್ಕ, ದೃಶ್ಯ ಸ್ಮರಣೆ ಮತ್ತು ಸೃಜನಶೀಲ ಚಿಂತನೆ.",ml:"സ്ഥലീയ ചിന്ത, ദൃശ്യ ഓർമ്മ, സർഗ്ഗാത്മക ചിന്ത."}},
      {title:{en:"Observation & Memory",hi:"अवलोकन और स्मृति",mr:"निरीक्षण आणि स्मृती",ta:"கவனிப்பு & நினைவகம்",te:"పరిశీలన & జ్ఞాపకశక్తి",kn:"ಅವಲೋಕನ & ಸ್ಮರಣೆ",ml:"നിരീക്ഷണം & ഓർമ്മ"},content:{en:"Observe objects and scenes then reproduce from memory. Tests attention to detail and visual recall ability.",hi:"वस्तुओं को देखें और स्मृति से पुनः बनाएं।",mr:"वस्तू पाहा आणि स्मृतीतून पुन्हा तयार करा.",ta:"பொருட்களை கவனித்து நினைவிலிருந்து உருவாக்குங்கள்.",te:"వస్తువులను పరిశీలించి జ్ఞాపకం నుండి పునరుత్పత్తి.",kn:"ವಸ್ತುಗಳನ್ನು ಗಮನಿಸಿ ಸ್ಮರಣೆಯಿಂದ ಮರುಸೃಷ್ಟಿಸಿ.",ml:"വസ്തുക്കൾ നിരീക്ഷിച്ച് ഓർമ്മയിൽ നിന്ന് പുനഃനിർമ്മിക്കുക."}},
      {title:{en:"Material & Product Knowledge",hi:"सामग्री और उत्पाद ज्ञान",mr:"साहित्य आणि उत्पाद ज्ञान",ta:"பொருள் & தயாரிப்பு அறிவு",te:"మెటీరియల్ & ఉత్పత్తి జ్ఞానం",kn:"ಸಾಮಗ್ರಿ & ಉತ್ಪನ್ನ ಜ್ಞಾನ",ml:"മെറ്റീരിയൽ & ഉൽപ്പന്ന അറിവ്"},content:{en:"Understanding of everyday materials, manufacturing processes and product design principles used in industry.",hi:"रोजमर्रा की सामग्री, निर्माण प्रक्रियाओं और उत्पाद डिज़ाइन की समझ।",mr:"दैनंदिन साहित्य, उत्पादन प्रक्रिया आणि उत्पाद डिझाइन तत्त्वे.",ta:"அன்றாட பொருட்கள், உற்பத்தி செயல்முறைகள் மற்றும் வடிவமைப்பு கோட்பாடுகள்.",te:"రోజువారీ పదార్థాలు, తయారీ ప్రక్రియలు మరియు ఉత్పత్తి డిజైన్.",kn:"ದೈನಂದಿನ ಸಾಮಗ್ರಿಗಳು, ತಯಾರಿಕಾ ಪ್ರಕ್ರಿಯೆಗಳು.",ml:"ദൈനംദിന വസ്തുക്കൾ, നിർമ്മാണ പ്രക്രിയകൾ, ഉൽപ്പന്ന ഡിസൈൻ."}},
      {title:{en:"Design History & GK",hi:"डिज़ाइन इतिहास",mr:"डिझाइन इतिहास",ta:"வடிவமைப்பு வரலாறு",te:"డిజైన్ చరిత్ర",kn:"ವಿನ್ಯಾಸ ಇತಿಹಾಸ",ml:"ഡിസൈൻ ചരിത്രം"},content:{en:"History of design, famous designers, movements like Bauhaus, Art Deco, Modernism and contemporary trends.",hi:"डिज़ाइन का इतिहास, प्रसिद्ध डिज़ाइनर, बौहाउस और समकालीन रुझान।",mr:"डिझाइनचा इतिहास, प्रसिद्ध डिझायनर आणि समकालीन ट्रेंड.",ta:"வடிவமைப்பின் வரலாறு, பிரபல வடிவமைப்பாளர்கள், பாஹாஸ்.",te:"డిజైన్ చరిత్ర, ప్రసిద్ధ డిజైనర్లు, బాఉహాస్.",kn:"ವಿನ್ಯಾಸದ ಇತಿಹಾಸ, ಪ್ರಸಿದ್ಧ ವಿನ್ಯಾಸಕರು.",ml:"ഡിസൈൻ ചരിത്രം, പ്രശസ്ത ഡിസൈനർമാർ."}}
    ]},
  NIFT:{color:"#6B3FA0",accent:"#A076D4",
    desc:{en:"National Institute of Fashion Technology",hi:"राष्ट्रीय फैशन प्रौद्योगिकी संस्थान",mr:"राष्ट्रीय फॅशन तंत्रज्ञान संस्था",ta:"தேசிய ஃபேஷன் தொழில்நுட்ப நிறுவனம்",te:"జాతీయ ఫ్యాషన్ టెక్నాలజీ సంస్థ",kn:"ರಾಷ್ಟ್ರೀಯ ಫ್ಯಾಷನ್ ತಂತ್ರಜ್ಞಾನ ಸಂಸ್ಥೆ",ml:"ദേശീയ ഫാഷൻ ടെക്നോളജി ഇൻസ്റ്റിറ്റ്യൂട്ട്"},
    topics:["Creative Ability","General Ability","Fashion Knowledge","Textiles","Situation Test"],
    syllabus:[
      {title:{en:"Creative Ability Test (CAT)",hi:"रचनात्मक योग्यता परीक्षा",mr:"सर्जनशील क्षमता चाचणी",ta:"படைப்பாற்றல் திறன் சோதனை",te:"క్రియేటివ్ ఎబిలిటీ టెస్ట్",kn:"ಸೃಜನಶೀಲ ಸಾಮರ್ಥ್ಯ ಪರೀಕ್ಷೆ",ml:"ക്രിയേറ്റീവ് ആബിലിറ്റി ടെസ്റ്റ്"},content:{en:"Evaluates creativity through color, composition and drawing tasks. Tests originality and aesthetic quality.",hi:"रंग, संरचना और चित्रकारी के माध्यम से रचनात्मकता का मूल्यांकन।",mr:"रंग, रचना आणि चित्रकाम द्वारे सर्जनशीलतेचे मूल्यांकन.",ta:"வண்ணம், அமைப்பு மற்றும் வரைதல் மூலம் படைப்பாற்றல் மதிப்பீடு.",te:"రంగు, కూర్పు మరియు డ్రాయింగ్ ద్వారా సృజనాత్మకత మూల్యాంకనం.",kn:"ಬಣ್ಣ, ರಚನೆ ಮತ್ತು ರೇಖಾಚಿತ್ರ ಕಾರ್ಯಗಳ ಮೂಲಕ ಸೃಜನಶೀಲತೆ ಮೌಲ್ಯಮಾಪನ.",ml:"വർണ്ണം, കോമ്പോസിഷൻ, ഡ്രോയിംഗ് ടാസ്ക്കുകൾ വഴി സർഗ്ഗാത്മകത."}},
      {title:{en:"General Ability Test (GAT)",hi:"सामान्य योग्यता परीक्षा",mr:"सामान्य क्षमता चाचणी",ta:"பொது திறன் சோதனை",te:"జనరల్ ఎబిలిటీ టెస్ట్",kn:"ಸಾಮಾನ್ಯ ಸಾಮರ್ಥ್ಯ ಪರೀಕ್ಷೆ",ml:"ജനറൽ ആബിലിറ്റി ടെസ്റ്റ്"},content:{en:"Quantitative ability, English comprehension, analytical ability, communication skills and general knowledge.",hi:"मात्रात्मक योग्यता, अंग्रेजी बोध, विश्लेषणात्मक क्षमता और सामान्य ज्ञान।",mr:"परिमाणात्मक क्षमता, इंग्रजी आकलन, विश्लेषणात्मक क्षमता आणि सामान्य ज्ञान.",ta:"அளவீட்டு திறன், ஆங்கில புரிதல், பகுப்பாய்வு திறன்.",te:"పరిమాణాత్మక సామర్థ్యం, ఇంగ్లీష్ అవగాహన, విశ్లేషణాత్మక సామర్థ్యం.",kn:"ಪರಿಮಾಣಾತ್ಮಕ ಸಾಮರ್ಥ್ಯ, ಇಂಗ್ಲಿಷ್ ಗ್ರಹಣ.",ml:"ക്വാണ്ടിറ്റേറ്റീവ് ആബിലിറ്റി, ഇംഗ്ലീഷ് ഗ്രാഹ്യം."}},
      {title:{en:"Fashion & Textile Awareness",hi:"फैशन और वस्त्र जागरूकता",mr:"फॅशन आणि वस्त्र जागरूकता",ta:"நாகரீக & துணி விழிப்புணர்வு",te:"ఫ్యాషన్ & టెక్స్టైల్ అవగాహన",kn:"ಫ್ಯಾಷನ್ & ಜವಳಿ ಅರಿವು",ml:"ഫാഷൻ & ടെക്സ്റ്റൈൽ അവബോധം"},content:{en:"Fashion history, Indian textiles including Banarasi, Kanjivaram, Chanderi, embroideries and contemporary trends.",hi:"फैशन इतिहास, भारतीय वस्त्र और समकालीन फैशन।",mr:"फॅशन इतिहास, भारतीय वस्त्र आणि समकालीन ट्रेंड.",ta:"ஃபேஷன் வரலாறு, இந்திய துணிகள் மற்றும் தற்கால போக்குகள்.",te:"ఫ్యాషన్ చరిత్ర, భారతీయ వస్త్రాలు మరియు సమకాలీన ట్రెండ్‌లు.",kn:"ಫ್ಯಾಷನ್ ಇತಿಹಾಸ, ಭಾರತೀಯ ಜವಳಿ ಮತ್ತು ಸಮಕಾಲೀನ ಟ್ರೆಂಡ್‌ಗಳು.",ml:"ഫാഷൻ ചരിത്രം, ഇന്ത്യൻ തുണിത്തരങ്ങൾ, സമകാലിക ട്രെൻഡുകൾ."}},
      {title:{en:"Situation Test",hi:"स्थिति परीक्षण",mr:"परिस्थिती चाचणी",ta:"சூழ்நிலை சோதனை",te:"సిచ్యుయేషన్ టెస్ట్",kn:"ಸಂದರ್ಭ ಪರೀಕ್ಷೆ",ml:"സിറ്റ്വേഷൻ ടെസ്റ്റ്"},content:{en:"Practical test: create 3D models using given materials to demonstrate spatial and creative ability.",hi:"व्यावहारिक परीक्षा: दी गई सामग्रियों से 3D मॉडल बनाएं।",mr:"व्यावहारिक चाचणी: दिलेल्या साहित्यातून 3D मॉडेल तयार करा.",ta:"நடைமுறை சோதனை: கொடுக்கப்பட்ட பொருட்களைக் கொண்டு 3D மாதிரிகளை உருவாக்குக.",te:"ఆచరణాత్మక పరీక్ష: ఇచ్చిన పదార్థాలతో 3D నమూనాలు తయారు చేయండి.",kn:"ಪ್ರಾಯೋಗಿಕ ಪರೀಕ್ಷೆ: ನೀಡಿದ ಸಾಮಗ್ರಿಗಳನ್ನು ಬಳಸಿ 3D ಮಾದರಿಗಳನ್ನು ರಚಿಸಿ.",ml:"പ്രായോഗിക പരീക്ഷ: നൽകിയ മെറ്റീരിയൽ ഉപയോഗിച്ച് 3D മോഡലുകൾ ഉണ്ടാക്കുക."}}
    ]},
  UCEED:{color:"#1A6B4A",accent:"#3DB87A",
    desc:{en:"Undergraduate Common Entrance Exam for Design",hi:"स्नातक सामान्य प्रवेश परीक्षा",mr:"पदवीपूर्व सामान्य प्रवेश परीक्षा",ta:"இளநிலை பொது நுழைவுத் தேர்வு",te:"అండర్ గ్రాడ్యుయేట్ ఎంట్రెన్స్",kn:"ಪದವಿಪೂರ್ವ ಸಾಮಾನ್ಯ ಪ್ರವೇಶ ಪರೀಕ್ಷೆ",ml:"അണ്ടർ ഗ്രാഡ്യുവേറ്റ് എൻട്രൻസ്"},
    topics:["Visualization","Observation","Design Thinking","Environment","Reasoning"],
    syllabus:[
      {title:{en:"Visualization & Spatial Ability",hi:"विज़ुअलाइज़ेशन और स्थानिक क्षमता",mr:"व्हिज्युअलायझेशन आणि स्थानिक क्षमता",ta:"காட்சிப்படுத்தல் & இட திறன்",te:"విజువలైజేషన్ & స్పేషియల్ ఎబిలిటీ",kn:"ದೃಶ್ಯೀಕರಣ & ಪ್ರಾದೇಶಿಕ ಸಾಮರ್ಥ್ಯ",ml:"വിഷ്വലൈസേഷൻ & സ്ഥലീയ ശേഷി"},content:{en:"Mentally rotate and manipulate 3D objects, understand spatial relationships and visualize cross-sections.",hi:"3D वस्तुओं को मानसिक रूप से घुमाना, स्थानिक संबंधों की समझ।",mr:"3D वस्तूंना मानसिकरीत्या फिरवणे, स्थानिक संबंधांची समज.",ta:"3D பொருட்களை மனதளவில் சுழற்றி கையாளுதல்.",te:"3D వస్తువులను మానసికంగా తిప్పడం మరియు స్థలీయ సంబంధాలు.",kn:"3D ವಸ್ತುಗಳನ್ನು ಮಾನಸಿಕವಾಗಿ ತಿರುಗಿಸುವ ಸಾಮರ್ಥ್ಯ.",ml:"3D വസ്തുക്കൾ മാനസികമായി കറക്കുന്നതും സ്ഥലീയ ബന്ധങ്ങൾ."}},

  {icon:"◷",title:{en:"Design History",hi:"डिज़ाइन इतिहास",mr:"डिझाइन इतिहास",ta:"வடிவமைப்பு வரலாறு",te:"డిజైన్ చరిత్ర",kn:"ವಿನ್ಯಾಸ ಇತಿಹಾಸ",ml:"ഡിസൈൻ ചരിത്രം"},content:{en:"Arts & Crafts → Art Nouveau → Bauhaus (1919) → Art Deco → Swiss Style → Pop Art (1960s) → Postmodernism → Digital (1990s+).",hi:"कला और शिल्प → आर्ट नोव्यू → बौहाउस → आर्ट डेको → स्विस → पॉप आर्ट → डिजिटल।",mr:"कला → आर्ट नोव्यू → बौहाउस → आर्ट डेको → स्विस → पॉप → डिजिटल.",ta:"கலை → ஆர்ட் நூவோ → பாஹாஸ் → ஆர்ட் டெக்கோ → சுவிஸ் → பாப் → டிஜிட்டல்.",te:"ఆర్ట్స్ → ఆర్ట్ నూవో → బాఉహాస్ → ఆర్ట్ డెకో → స్విస్ → పాప్ → డిజిటల్.",kn:"ಕಲೆ → ಆರ್ಟ್ ನೂವೊ → ಬೌಹಾಸ್ → ಆರ್ಟ್ ಡೆಕೋ → ಸ್ವಿಸ್ → ಪಾಪ್ → ಡಿಜಿಟಲ್.",ml:"ആർട്‌സ് → ആർട് നൂവോ → ബൗഹൗസ് → ആർട് ഡെക്കോ → സ്വിസ് → പോപ് → ഡിജിറ്റൽ."}},
  {icon:"◌",title:{en:"Gestalt Principles",hi:"गेस्टाल्ट सिद्धांत",mr:"गेस्टाल्ट तत्त्वे",ta:"கெஸ்டால்ட் கோட்பாடுகள்",te:"గెస్టాల్ట్ సూత్రాలు",kn:"ಗೆಸ್ಟಾಲ್ಟ್ ತತ್ವಗಳು",ml:"ഗെസ്റ്റാൾട്ട് തത്വങ്ങൾ"},content:{en:"Proximity, Similarity, Continuation, Closure, Figure-Ground, Symmetry — how the brain organizes visual information into patterns.",hi:"निकटता, समानता, निरंतरता, बंदी, आकृति-भूमि, समरूपता।",mr:"निकटता, समानता, सातत्य, बंदी, आकृती-भूमी, सममिती.",ta:"அருகிருத்தல், ஒற்றுமை, தொடர்ச்சி, மூடல், முன்னணி-பின்னணி.",te:"ప్రాక్సిమిటీ, సిమిలారిటీ, కంటిన్యుయేషన్, క్లోజర్, ఫిగర్-గ్రౌండ్.",kn:"ಸಾಮೀಪ್ಯ, ಸಾದೃಶ್ಯ, ಮುಂದುವರಿಕೆ, ಮುಚ್ಚಿವೆ, ಆಕೃತಿ-ನೆಲ.",ml:"പ്രോക്സിമിറ്റി, സിമിലാരിറ്റി, കണ്ടിന്യുവേഷൻ, ക്ലോഷർ."}}
];

const QUIZ = [
  {q:"A cube painted on all faces is cut into 27 smaller cubes. How many have exactly 2 painted faces?",opts:["8","12","6","4"],ans:1,exp:"Edge cubes (not corners) have 2 painted faces. A 3×3×3 cube has 12 edge positions."},
  {q:"Which color is opposite to Red on the standard color wheel?",opts:["Blue","Green","Cyan","Yellow"],ans:1,exp:"Green is complementary to Red on the RYB color wheel used in art and design."},
  {q:"Bauhaus school was founded in which year?",opts:["1905","1919","1925","1933"],ans:1,exp:"Bauhaus was founded by Walter Gropius in Weimar, Germany in 1919."},
  {q:"A logo is 5cm wide at 1:1 scale. What is its width at 300%?",opts:["10cm","15cm","20cm","25cm"],ans:1,exp:"300% of 5cm = 5 × 3 = 15cm."},
  {q:"Which is NOT a primary color in the RGB (light) color model?",opts:["Red","Green","Blue","Yellow"],ans:3,exp:"In the RGB model for screens, primaries are Red, Green, Blue. Yellow is secondary."},
  {q:"Which design principle ensures no single element overpowers another?",opts:["Contrast","Balance","Rhythm","Emphasis"],ans:1,exp:"Balance ensures visual equilibrium — no part feels heavier than others."},
  {q:"An image is 800×600 pixels. What is its aspect ratio?",opts:["3:2","4:3","16:9","5:4"],ans:1,exp:"800÷200=4 and 600÷200=3, giving aspect ratio 4:3."},
  {q:"Which Indian textile is Varanasi famous for?",opts:["Chanderi","Banarasi Silk","Kanjivaram","Pashmina"],ans:1,exp:"Banarasi Silk with gold/silver brocade originates from Varanasi, Uttar Pradesh."},
  {q:"What does 'kerning' mean in typography?",opts:["Line spacing","Letter size","Space between letters","Font weight"],ans:2,exp:"Kerning refers to the adjustment of space between individual letter pairs in typography."},
  {q:"Which movement is known for 'form follows function'?",opts:["Art Nouveau","Bauhaus","Art Deco","Rococo"],ans:1,exp:"Bauhaus popularized 'form follows function' — design should serve its purpose efficiently."}
];

// State
let lang = "en";
let exam = "NID";
let activeTab = "home";
let quizIdx = 0, quizScore = 0, quizSelected = null, quizDone = false;
let chatHistory = [];
let isLoading = false;

function t(key){ return UI[lang][key]; }
function ex(){ return EXAMS[exam]; }

function setCSS(){
  const e = ex();
  document.documentElement.style.setProperty('--c', e.color);
  document.documentElement.style.setProperty('--a', e.accent);
  document.body.style.fontFamily = LANGS[lang].font;
  document.getElementById('glow1').style.background = `radial-gradient(circle,${e.color}18 0%,transparent 70%)`;
  document.getElementById('glow2').style.background = `radial-gradient(circle,${e.accent}0D 0%,transparent 70%)`;
  document.getElementById('logoIcon').style.background = e.color;
  document.getElementById('logoTitle').style.color = e.color;
  document.getElementById('langBtn').style.borderColor = e.color+'80';
  document.getElementById('langBtn').style.color = e.accent;
}

function buildLangMenu(){
  const menu = document.getElementById('langMenu');
  menu.innerHTML = Object.entries(LANGS).map(([code,info])=>
    `<button class="lang-item ${code===lang?'active':''}" onclick="setLang('${code}')" style="font-family:${info.font}">${info.label}</button>`
  ).join('');
}

function toggleLang(){
  const m = document.getElementById('langMenu');
  m.classList.toggle('open');
}

function setLang(code){
  lang = code;
  document.getElementById('langMenu').classList.remove('open');
  document.getElementById('langLabel').textContent = LANGS[code].label;
  document.body.style.fontFamily = LANGS[code].font;
  buildLangMenu();
  renderAll();
  // Reset chat greeting
  chatHistory = [{role:'ai',text:getLangGreeting()}];
  renderChat();
}

function getLangGreeting(){
  const greet = {en:"Hi! I'm your Design Entrance AI Tutor 🎨 (Free — Google Gemini). Ask me anything about NID, NIFT, UCEED or CEED!",hi:"नमस्ते! मैं आपका AI ट्यूटर हूँ 🎨 NID, NIFT, UCEED या CEED के बारे में पूछें!",mr:"नमस्कार! मी तुमचा AI शिक्षक आहे 🎨 कुठलाही प्रश्न विचारा!",ta:"வணக்கம்! நான் உங்கள் AI ஆசிரியர் 🎨 எதையும் கேளுங்கள்!",te:"నమస్కారం! నేను మీ AI గురువు 🎨 ఏదైనా అడగండి!",kn:"ನಮಸ್ಕಾರ! ನಾನು ನಿಮ್ಮ AI ಶಿಕ್ಷಕ 🎨 ಏನನ್ನಾದರೂ ಕೇಳಿ!",ml:"നമസ്കാരം! ഞാൻ നിങ്ങളുടെ AI ട്യൂട്ടർ 🎨 എന്തും ചോദിക്കൂ!"};
  return greet[lang];
}

function buildExamTabs(){
  document.getElementById('examTabs').innerHTML = Object.keys(EXAMS).map(k=>
    `<button class="exam-btn ${k===exam?'active':''}" onclick="setExam('${k}')" style="${k===exam?`background:${EXAMS[k].color};border-color:${EXAMS[k].color};color:#fff`:`border-color:#222`}">${k}</button>`
  ).join('');
  document.getElementById('examDesc').textContent = ex().desc[lang];
}

function setExam(e){
  exam = e;
  setCSS();
  buildExamTabs();
  renderSyllabus();
  renderNav();
}

function buildNav(){
  document.getElementById('mainNav').innerHTML = t('tabs').map((label,i)=>{
    const ids = ['home','design','gat','chat'];
    return `<button class="nav-btn ${activeTab===ids[i]?'active':''}" onclick="switchTab('${ids[i]}')">${label}</button>`;
  }).join('');
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  activeTab = id;
  buildNav();
}

function renderNav(){
  buildNav();
}

function renderSyllabus(){
  document.getElementById('syllabusHead').textContent = t('syllabusHead')+' — '+exam;
  const tags = document.getElementById('topicTags');
  tags.innerHTML = ex().topics.map(tp=>`<span class="tag">${tp}</span>`).join('');
  const cards = document.getElementById('syllabusCards');
  cards.innerHTML = ex().syllabus.map((item,i)=>`
    <div class="syllabus-card" onclick="toggleCard(${i})">
      <div class="card-header">
        <span class="card-num" style="background:${ex().color}">${i+1}</span>
        <span class="card-title" style="font-family:${LANGS[lang].font}">${item.title[lang]}</span>
        <span class="card-arrow" id="arrow-${i}">▼</span>
      </div>
      <div class="card-content" id="content-${i}" style="font-family:${LANGS[lang].font}">${item.content[lang]}</div>
    </div>
  `).join('');
}

function toggleCard(i){
  const c = document.getElementById('content-'+i);
  const a = document.getElementById('arrow-'+i);
  c.classList.toggle('open');
  a.classList.toggle('open');
}

function renderTheory(){
  document.getElementById('designHead').textContent = t('designHead');
  document.getElementById('theoryCards').innerHTML = THEORY.map(item=>`
    <div class="theory-card">
      <div class="theory-bg">${item.icon}</div>
      <div class="theory-icon">${item.icon}</div>
      <div class="theory-title" style="font-family:${LANGS[lang].font}">${item.title[lang]}</div>
      <div class="theory-content" style="font-family:${LANGS[lang].font}">${item.content[lang]}</div>
    </div>
  `).join('');
}

function renderGAT(){
  document.getElementById('gatHead').textContent = t('gatHead');
  const el = document.getElementById('gatContent');
  if(quizDone){
    el.innerHTML = `
      <div class="done-box">
        <div class="done-emoji">🎉</div>
        <div class="done-title" style="font-family:${LANGS[lang].font}">${t('done')}</div>
        <div class="done-score" style="color:${ex().accent}">${t('score')}: ${quizScore}/${QUIZ.length}</div>
        <div class="done-msg" style="font-family:${LANGS[lang].font}">${quizScore>=7?t('excellent'):quizScore>=5?t('good'):t('keep')}</div>
        <button class="retry-btn" style="background:${ex().color};font-family:${LANGS[lang].font}" onclick="resetQuiz()">${t('tryAgain')}</button>
      </div>`;
    return;
  }
  const q = QUIZ[quizIdx];
  el.innerHTML = `
    <div class="quiz-meta">
      <span style="color:#444">Q ${quizIdx+1}/${QUIZ.length}</span>
      <span style="color:${ex().accent}">${t('score')}: ${quizScore}</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${(quizIdx/QUIZ.length)*100}%;background:${ex().color}"></div></div>
    <div class="quiz-card">
      <div class="quiz-q-text">${q.q}</div>
      ${q.opts.map((opt,i)=>`
        <button class="quiz-opt ${quizSelected!==null?(i===q.ans?'correct':(i===quizSelected&&i!==q.ans?'wrong':'')):''}"
          onclick="selectOpt(${i})" ${quizSelected!==null?'disabled':''}>
          <span style="color:#333;margin-right:7px;font-size:10px">${String.fromCharCode(65+i)}.</span>${opt}
        </button>
      `).join('')}
      ${quizSelected!==null?`
        <div class="quiz-explain"><strong style="color:${ex().accent}">${t('expl')}:</strong> ${q.exp}</div>
        <button class="next-btn" style="background:${ex().color};font-family:${LANGS[lang].font}" onclick="nextQ()">
          ${quizIdx+1<QUIZ.length?t('next'):t('results')}
        </button>
      `:''}
    </div>`;
}

function selectOpt(i){
  if(quizSelected!==null) return;
  quizSelected = i;
  if(i===QUIZ[quizIdx].ans) quizScore++;
  renderGAT();
}

function nextQ(){
  quizIdx++;
  quizSelected = null;
  if(quizIdx>=QUIZ.length) quizDone = true;
  renderGAT();
}

function resetQuiz(){
  quizIdx=0; quizScore=0; quizSelected=null; quizDone=false;
  renderGAT();
}

function renderChatUI(){
  document.getElementById('chatHead').textContent = t('chatHead');
  document.getElementById('chatInput').placeholder = t('placeholder');
  const qp = document.getElementById('quickPrompts');
  qp.innerHTML = t('prompts').map(p=>`<button class="qp-btn" onclick="setPrompt('${p}')">${p}</button>`).join('');
}

function setPrompt(p){
  document.getElementById('chatInput').value = p;
  document.getElementById('chatInput').focus();
}

function renderChat(){
  const box = document.getElementById('chatBox');
  box.innerHTML = chatHistory.map(m=>`
    <div class="msg ${m.role}">
      <div class="msg-bubble" style="font-family:${LANGS[lang].font}">${m.text}</div>
    </div>
  `).join('');
  if(isLoading){
    box.innerHTML += `<div class="msg ai"><div class="msg-bubble typing">${t('thinking')}<span class="blink">...</span></div></div>`;
  }
  box.scrollTop = box.scrollHeight;
}

async function sendMessage(){
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg || isLoading) return;
  input.value = '';
  chatHistory.push({role:'user',text:msg});
  isLoading = true;
  renderChat();
  try{
    const prompt = `You are an expert tutor for Indian design entrance exams (NID, NIFT, UCEED, CEED). Current exam: ${exam}. Always respond in ${LANGS[lang].label}. Be helpful and concise.\n\nUser: ${msg}`;
    const res = await fetch(GEMINI_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{maxOutputTokens:600,temperature:0.7}
      })
    });
    if(!res.ok){
      const err = await res.json();
      const errMsg = err?.error?.message || 'Unknown error';
      if(errMsg.includes('API_KEY')||errMsg.includes('key')){
        chatHistory.push({role:'ai',text:"❌ API key error. Please check your Gemini key is correct in the code."});
      } else {
        chatHistory.push({role:'ai',text:`❌ Error: ${errMsg}`});
      }
    } else {
      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, no response received.";
      chatHistory.push({role:'ai',text:reply});
    }
  }catch(e){
    // Try alternate model if first fails
    try{
      const prompt = `You are an expert tutor for Indian design entrance exams (NID, NIFT, UCEED, CEED). Current exam: ${exam}. Always respond in ${LANGS[lang].label}. Be helpful and concise.\n\nUser: ${msg}`;
      const altUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`;
      const res2 = await fetch(altUrl,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:600,temperature:0.7}
        })
      });
      const data2 = await res2.json();
      const reply2 = data2.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, couldn't get response.";
      chatHistory.push({role:'ai',text:reply2});
    }catch(e2){
      chatHistory.push({role:'ai',text:"❌ Network error. Make sure you are on a good internet connection and your API key is valid."});
    }
  }
  isLoading = false;
  renderChat();
}

document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') sendMessage();
});

function renderAll(){
  setCSS();
  buildLangMenu();
  buildExamTabs();
  buildNav();
  renderSyllabus();
  renderTheory();
  renderGAT();
  renderChatUI();
  renderChat();
}

// Init
chatHistory = [{role:'ai',text:getLangGreeting()}];
renderAll();
</script>
</body>
</html>
